<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flux Creative Technologies Sign up</title>
  <style>
    body {
      background: linear-gradient(to top, #15002B, #9300FF);
      background-size: cover;
      background-position: center;
      height: 100vh;
      margin: 0;
      background-color: rgba(51, 51, 51, 0.9);
      box-shadow: 0 2px 4px rgba(255, 255, 255, 0.1);
      font-family: 'Montserrat', sans-serif;
}
* {
  -webkit-tap-highlight-color: transparent;
user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

/* Apply to all images */
img {
  -webkit-user-drag: none;
  user-drag: none;
  pointer-events: none;
}

.container {
      position: absolute;
      transform: translate(-50%, -50%);
      top: 50%;
      left: 50%;
}

    form {
     background: rgba(4, 0, 28, 5);
padding: 3em;
heieht: 320px;
border-radius: 20px;
border-left: 1px solid rgba(147 0, 255, 0.6);
border-top: 1px solid rgba(147 0, 255, 0.6);
-webkit-backdrop-filter: blur(10px);
backdrop-filter: blur(10px);
box-shadow: 20px 20px 40px -6px rgba(147 0, 255, 0.2);
text-align: center;
position: relative;
-webkit-transition: all 0.2s ease-in-out;
transition: all 0.2s ease-in-out;
}

    form h2 {
      font-weight: 550;
      color: white;
      opacity: 0.8;
      font-size: 1.4rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

.signup-option {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* Align content to the left */
  background-image: linear-gradient(to right, #9300FF, #B32BD1);
  color: white;
  padding: 1em 1.5em;
  margin: 10px 0;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 500;
  font-size: 1rem;
  box-shadow: 4px 4px 60px rgba(0, 0, 0, 0.2);
  transition: all 0.2s ease-in-out;
  width: 270px; /* Adjust width as needed */
}

.signup-option img {
      width: 24px;
      height: 24px;
      margin-right: 30px;
      object-fit: contain;
}

.signup-option:hover {
      opacity: 0.9;
}
.signup-option span {
  flex-grow: 1;
  text-align: left;
}

.divider {
      color: white;
      opacity: 0.6;
      margin: 20px 0;
}

    a {
      text-decoration: none;
      color: white;
      font-size: 12px;
}

    a:hover {
      text-shadow: 2px 2px 6px #00000040;
}
  </style>
</head>
<body>

  <div class="container">
    <form>
      <h2>Create Your Account</h2>

      <button class="signup-option">
        <img src="google-icon.png" alt="Google Icon">Continue with Google
      </button>

      <button class="signup-option">
        <img src="email-icon.png" alt="Email Icon">Sign up with Email
      </button>

      <button class="signup-option">
        <img src="facebook-icon.png" alt="Facebook Icon">Sign up with Facebook
      </button>

      <button class="signup-option">
        <img src="apple-icon.png" alt="Apple Icon">Sign up with Apple
      </button>

      <div class="divider">or</div>

      <a href="index.html">Already have an account? Log in</a>
    </form>
  </div>

</body>
</html>
