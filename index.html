<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flux Creative Technologies Login</title>
    <style>
        
body {
background: linear-gradient(to top, #15002B, #9300FF);
background-size: cover;
background-position: center;
height: 100vh;
margin: 0;
background-color: rgba(51, 51, 51, 0.9);
box-shadow: 0 2px 4px rgba(255, 255, 255, 0.1);
font-family: 'Montserrat', sans-serif;
}
* {
  -webkit-tap-highlight-color: 1px solid rgba(147 0, 255, 0.6);
user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

/* Apply to all images */
img {
  -webkit-user-drag: none;
  user-drag: none;
  pointer-events: none;
}
.container {
position: absolute;
-webkit-transform: translate(-50%, -50%);
transform: translate(-50%, -50%);
top: 50%;
left: 50%;
}
Form {
background: rgba(4, 0, 28, 5);
padding: 3em;
heieht: 320px;
border-radius: 20px;
border-left: 1px solid rgba(147 0, 255, 0.6);
border-top: 1px solid rgba(147 0, 255, 0.6);
-webkit-backdrop-filter: blur(10px);
backdrop-filter: blur(10px);
box-shadow: 20px 20px 40px -6px rgba(147 0, 255, 0.2);
text-align: center;
position: relative;
-webkit-transition: all 0.2s ease-in-out;
transition: all 0.2s ease-in-out;
}
form p {
font-weight: 500;
color: white;
opacity: 0.7;
font-size: 1.8rem;
margin-top: 0;
margin-bottom: 60px;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

form a {
text-decoration: none;
color: white;
font-size: 12px;
}
form a:hover{
text-shadow: 2px 2px 6px #00000040;
}
form a:active{
test-shadow: none;
}
form input {
background: transparent;
width: 200px;
padding: 1em;
margin-bottom: 2em;
border: none;
border-left: 1px solid rgba(147, 0, 255, 80);
border-top: lpx solid rgba (147, 0, 255, 80);
border-radius: 5000px;
-webkit-backdrop-filter: blur(10px);
backdrop-filter: blur(5px);
box-shadow: 4px 4px 60px rgba(147, 0, 255, 0.15);
color: white;
font-family: Montserrat, sans-serif;
font-weight: 500;
-webkit-transition: all 0.2s ease-in-out;
transition: all 0.2s ease-in-out;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}
.form b {
    background: rgba(147, 0, 255, 80);
width: 200px;
padding: 1em;
margin-bottom: 2em;
border: none;
border-left: 1px solid rgba(147, 0, 255, 80);
border-top: lpx solid rgba (147, 0, 255, 80);
border-radius: 5000px;
-webkit-backdrop-filter: blur(50px);
backdrop-filter: blur(5px);
box-shadow: 4px 4px 60px rgba(0, 0, 0, 0.2);
color: white;
font-family: Montserrat, sans-serif;
font-weight: 500;
-webkit-transition: all 0.2s ease-in-out;
transition: all 0.2s ease-in-out;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}


form h2 {
font-weight: 600;
color: white;
opacity: 0.7;
font-size: 0.8rem;
margin-top: 50px;
margin-bottom: 0;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}
.gradient-button {
  width: 200px;
  padding: 1em;
  margin-bottom: 2em;
  border: none;
  border-radius: 5000px;
  background-image: linear-gradient(to right, #9300FF, #B32BD1);
  color: white;
  font-family: Montserrat, sans-serif;
  font-weight: 500;
  box-shadow: 4px 4px 60px rgba(0, 0, 0, 0.2);
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
  transition: all 0.2s ease-in-out;
  cursor: pointer;
}


    </style>
</head>
<body>

  <div id="preloader-container"></div>

  <!-- Your main content -->
  
  <div id="main-content" style="display:none;">
    <!-- Your website content here -->
   
<div class="container">
<form>
<p><img src="flux.png" alt="Welcome Icon" style="width: 150px; margin-bottom: 0;"></p>
<input type="email" placeholder="username"><br>
<input type="password" placeholder="Password" <br><br>
<b><input type="button" value="Log in" class="gradient-button"><br></b>
<a href"#">Forgot Password ?</a>
<h2>Don't have an account yet</h2><br>
<a href="signup.html"><input type="button" value="Sign in" class="gradient-button"></a><br>
<a href="https://fluxcreativetech.com/services#design"><input type="button" value="Continue without signing in" class="gradient-button"></a><br>

</form>

<diy class="drops">
<div class="drop drop-1"></div>
<div class="drop drop-2"></div>
<div class="drop drop-3"></div>
<div class="drop drop-4"></div>
<div class="drop drop-5"><div>
</div>
</div>
</body>

  </div>

  <script>
    fetch('preloader.html')
      .then(response => response.text())
      .then(data => { document.getElementById('preloader-container').innerHTML = data;
      })
      .catch(err => console.error('Failed to load preloader:', err));

    window.addEventListener('load', () => {
      document.getElementById('preloader-container').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    });
  </script>
</body>
</html>
